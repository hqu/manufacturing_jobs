<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manufacturing Employment by Commuting Zone</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #26323d;
      --panel: rgba(251, 251, 253, 0.98);
      --ink: #24282f;
      --muted: #5b5e69;
      --border: rgba(154, 161, 177, 0.28);
      --shadow: 0 18px 42px rgba(16, 24, 32, 0.22);
      --font-ui: "Poppins", "Avenir Next", "Segoe UI", sans-serif;
      --map-empty: #e5e5ea;
      --accent: #cc1f36;
      --accent-soft: #f3c7d0;
      --accent-mid: #e88a9d;
      --navy-soft: #5e618a;
      --panel-edge: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font-ui);
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(241, 48, 129, 0.16) 0, rgba(241, 48, 129, 0.16) 48px, transparent 48px),
        linear-gradient(180deg, #26323d 0%, #2f3c49 100%);
    }

    .layout {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 100vh;
      padding: 5px 18px 10px;
      width: min(800px, 100%);
      margin: 0 auto;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .panel {
      background: var(--panel);
      backdrop-filter: blur(10px);
      padding: 14px 16px 10px;
      display: grid;
      grid-template-columns: minmax(180px, 1.1fr) minmax(0, 2.1fr) minmax(0, 1.6fr);
      gap: 14px;
      align-items: stretch;
    }

    .control-step {
      min-width: 0;
    }

    .control-step + .control-step {
      border-left: 2px solid rgba(36, 40, 47, 0.18);
      padding-left: 18px;
    }

    .step-stack .control-step + .control-step {
      border-left: none;
      padding-left: 0;
      border-top: 1px solid rgba(36, 40, 47, 0.14);
      padding-top: 8px;
    }

    .control-step.step-job .option-button {
      font-size: 14px;
    }

    .control-step.step-1 .option-button {
      font-size: 9px;
    }

    .control-step.step-1 .option-stack {
      gap: 0;
    }

    .control-step.step-stack {
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .control-step.step-2 {
      width: calc(110% + 50px);
      justify-self: start;
    }

    .control-step.step-date {
      width: calc(100% - 70px);
      justify-self: start;
    }

    .step-heading {
      margin: 0 0 10px;
      font-size: 12px;
      line-height: 1.2;
      font-weight: 400;
      color: var(--ink);
    }

    .step-heading-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .step-heading-row .step-heading {
      margin: 0;
    }

    .step-heading strong {
      font-weight: 700;
    }

    .eyebrow {
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 11px;
      color: var(--accent);
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: 31px;
      line-height: 1.08;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .lede,
    .small {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 13px;
      font-weight: 400;
    }

    .stat-card,
    .info-card {
      background: #ffffff;
      border: 1px solid var(--panel-edge);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 6px 18px rgba(36, 40, 47, 0.06);
    }

    .time-card {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(36, 40, 47, 0.08);
      box-shadow: 0 10px 24px rgba(36, 40, 47, 0.08);
      background: #ffffff;
    }

    .time-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 14px;
      background: #24282f;
      color: #ffffff;
    }

    .time-card-title {
      margin: 0;
      font-size: 11px;
      line-height: 1.2;
      font-weight: 600;
      text-align: right;
    }

    .time-card-bottom {
      padding: 10px 14px 12px;
      background: #fbfbfd;
    }

    .option-stack {
      display: grid;
      gap: 4px;
    }

    .option-button {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 4px 0;
      border: none;
      background: transparent;
      color: var(--ink);
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      transition: color 160ms ease;
    }

    .option-button::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      border: 1.5px solid rgba(36, 40, 47, 0.48);
      background: #ffffff;
      box-shadow: inset 0 0 0 3px #ffffff;
    }

    .option-button.is-active {
      color: var(--ink);
      font-weight: 600;
    }

    .option-button:disabled {
      color: #a6adb8;
      cursor: not-allowed;
      opacity: 0.7;
    }

    .option-button.is-active::before {
      border-color: #111111;
      background: #111111;
    }

    .stat-label {
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 9px;
      letter-spacing: 0;
      text-transform: none;
      font-weight: 500;
    }

    .stat-value {
      margin: 0;
      font-size: 14px;
      line-height: 1.05;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #ffffff;
    }

    .slider-endpoints {
      display: flex;
      justify-content: space-between;
      margin-top: 0;
      color: #bcc3cd;
      font-size: 8px;
      font-weight: 400;
    }

    .compare-slider-endpoints {
      display: none;
    }

    .compare-block {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid rgba(36, 40, 47, 0.12);
    }

    .compare-block.is-hidden {
      display: none;
    }

    .compare-toggle-btn {
      margin-top: 10px;
      width: 100%;
      border: 1px solid rgba(36, 40, 47, 0.24);
      background: #ffffff;
      color: var(--ink);
      border-radius: 10px;
      padding: 6px 10px;
      font-family: var(--font-ui);
      font-size: 9px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
    }

    .compare-toggle-btn:disabled {
      background: #d2d7e0;
      color: #f6f7fa;
      border-color: #d2d7e0;
      cursor: not-allowed;
    }

    .compare-toggle-btn.is-hidden {
      display: none;
    }

    .compare-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 2px;
    }

    .compare-label {
      margin: 0;
      color: var(--ink);
      font-size: 8px;
      line-height: 1.2;
      font-weight: 400;
      white-space: normal;
    }

    .compare-step-heading {
      margin: 0;
      font-size: 12px;
      line-height: 1.2;
      font-weight: 400;
      color: var(--ink);
    }

    .compare-step-prefix {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.2;
    }

    .compare-date {
      margin: 0;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.2;
      font-weight: 700;
      text-align: center;
      white-space: nowrap;
      width: 100%;
      display: block;
    }

    #month-slider,
    #compare-slider {
      accent-color: #32353e;
      appearance: none;
      -webkit-appearance: none;
      height: 22px;
      background: transparent;
      cursor: grab;
    }

    #month-slider::-webkit-slider-runnable-track,
    #compare-slider::-webkit-slider-runnable-track {
      height: 8px;
      border-radius: 999px;
      background: #d9dde5;
      border: 1px solid #c8ceda;
    }

    #month-slider::-moz-range-track,
    #compare-slider::-moz-range-track {
      height: 8px;
      border-radius: 999px;
      background: #d9dde5;
      border: 1px solid #c8ceda;
    }

    #month-slider::-webkit-slider-thumb,
    #compare-slider::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      margin-top: -5px;
      border-radius: 999px;
      border: 1.5px solid #eef1f6;
      background: #5f699e;
      box-shadow: 0 3px 8px rgba(38, 45, 78, 0.3);
      cursor: grab;
    }

    #month-slider::-moz-range-thumb,
    #compare-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 1.5px solid #eef1f6;
      background: #5f699e;
      box-shadow: 0 3px 8px rgba(38, 45, 78, 0.3);
      cursor: grab;
    }

    #month-slider:active,
    #compare-slider:active,
    #month-slider::-webkit-slider-thumb:active,
    #compare-slider::-webkit-slider-thumb:active,
    #month-slider::-moz-range-thumb:active,
    #compare-slider::-moz-range-thumb:active {
      cursor: grabbing;
    }

    #compare-slider {
      margin-bottom: -35px;
    }

    .date-select-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .date-select {
      appearance: none;
      -webkit-appearance: none;
      border: none;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.12);
      color: #ffffff;
      font-family: var(--font-ui);
      font-size: 9px;
      font-weight: 600;
      line-height: 1.2;
      padding: 8px 29px 8px 11px;
      min-width: 84px;
      background-image:
        linear-gradient(45deg, transparent 50%, rgba(255, 255, 255, 0.8) 50%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.8) 50%, transparent 50%);
      background-position:
        calc(100% - 18px) calc(50% - 1px),
        calc(100% - 12px) calc(50% - 1px);
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
      cursor: pointer;
    }

    #month-select.date-select {
      min-width: 108px;
      font-weight: 700;
      padding-right: 32px;
    }

    #year-select.date-select {
      min-width: 67px;
      max-width: 67px;
      padding-right: 26px;
      padding-left: 9px;
    }

    .date-select option {
      color: var(--ink);
      background: #ffffff;
    }

    .exit-compare-btn {
      border: none;
      background: transparent;
      color: #5c6370;
      padding: 0;
      margin: 0;
      font-family: var(--font-ui);
      font-size: 8px;
      font-weight: 600;
      line-height: 0.9;
      text-decoration: underline;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      align-self: flex-start;
    }

    .exit-compare-btn.is-hidden {
      display: none;
    }

    .exit-x {
      font-size: calc(1em + 2px);
      line-height: 1;
      font-weight: inherit;
      text-decoration: none;
    }

    .field-stack {
      display: grid;
      gap: 3px;
    }

    .filter-choice {
      display: grid;
      gap: 4px;
      padding: 8px 12px;
      border-radius: 12px;
      border: 1px solid var(--panel-edge);
      background: #ffffff;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(36, 40, 47, 0.04);
      transition: border-color 160ms ease, box-shadow 160ms ease, background-color 160ms ease;
    }

    .filter-choice input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .filter-choice.is-selected {
      border-color: rgba(154, 161, 177, 0.48);
      box-shadow: none;
      background: #eef1f5;
      cursor: not-allowed;
    }

    .filter-choice.is-selected .filter-choice-value {
      color: #8e95a1;
    }

    .filter-choice-label {
      font-size: 9px;
      color: var(--muted);
      line-height: 1.2;
      font-weight: 500;
    }

    .filter-choice-value {
      font-size: 9px;
      color: var(--ink);
      line-height: 1.2;
      font-weight: 600;
    }

    .top-list {
      margin: 0;
      padding-left: 20px;
      display: grid;
      gap: 8px;
      color: var(--ink);
    }

    .top-list strong {
      display: block;
      font-size: 13px;
      font-weight: 600;
    }

    .top-list span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
    }

    .map-wrap {
      position: relative;
      background: rgba(251, 251, 253, 0.98);
      border: 1px solid rgba(154, 161, 177, 0.18);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
      padding: 10px 0 8px;
    }

    .map-legend-wrap {
      position: absolute;
      top: 34px;
      right: 14px;
      z-index: 500;
      width: min(206px, calc(100% - 36px));
      margin-top: 0;
    }

    .map-reset-btn {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 520;
    }

    .map-reset-btn.is-hidden {
      display: none;
    }

    #map {
      width: 100%;
      height: 46vh;
      min-height: 46vh;
      background: #f7f7fb;
      margin-top: 34px;
      margin-left: 0;
    }

    .leaflet-container {
      font-family: var(--font-ui);
    }

    .leaflet-container .leaflet-interactive:focus {
      outline: none !important;
    }

    .cz-info-line {
      width: 100%;
      margin-top: 0;
      margin-bottom: 0;
      margin-left: -65px;
      text-align: left;
      min-height: 100%;
      height: 100%;
      align-self: stretch;
      box-shadow: none;
      border-left: 2px solid rgba(36, 40, 47, 0.18);
      padding-left: 12px;
      display: flex;
      flex-direction: column;
    }

    .cz-info-line h3,
    .cz-info-line p {
      text-align: left;
    }

    .map-title {
      position: absolute;
      top: 12px;
      left: 34px;
      right: 34px;
      z-index: 500;
      width: calc(100% - 68px);
      background: transparent;
      border: none;
      border-radius: 0;
      box-shadow: none;
      padding: 0;
      backdrop-filter: none;
      text-align: center;
    }

    .map-title h2 {
      margin: 0;
      font-size: 17px;
      line-height: 1.05;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    .map-title p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      font-weight: 400;
    }

    .legend {
      padding: 8px 12px 9px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 14px;
      border: 1px solid rgba(154, 161, 177, 0.28);
      color: var(--ink);
      min-width: 180px;
      box-shadow: 0 8px 20px rgba(36, 40, 47, 0.08);
    }

    .legend h3 {
      margin: 0 0 10px;
      font-size: 8px;
      font-weight: 700;
    }

    .legend-scale {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
    }

    .legend-bar {
      height: 16px;
      border-radius: 999px;
      border: 1px solid rgba(154, 161, 177, 0.3);
      background: linear-gradient(90deg, #d9dae8 0%, #5f699e 100%);
    }

    .legend-end {
      font-size: 9px;
      color: var(--muted);
      font-weight: 500;
      white-space: nowrap;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
    }

    .legend-row + .legend-row {
      margin-top: 6px;
    }

    .hover-card {
      background: rgba(255, 255, 255, 0.97);
      border-radius: 16px;
      border: 1px solid rgba(154, 161, 177, 0.22);
      box-shadow: 0 14px 28px rgba(36, 40, 47, 0.12);
      padding: 14px 16px;
      width: 295px;
      text-align: right;
    }

    .leaflet-top.leaflet-right .leaflet-control {
      margin-top: 0;
      margin-right: 0;
    }

    .hover-card h3 {
      margin: 0 0 6px;
      font-size: 16px;
      line-height: 1.18;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .hover-card p {
      margin: 4px 0;
      font-size: 10px;
      line-height: 1.45;
      color: var(--muted);
      font-weight: 400;
    }

    .cz-rank-table-wrap {
      margin-top: 6px;
    }

    .cz-rank-table-wrap h4 {
      margin: 0 0 4px;
      font-size: 10px;
      line-height: 1.2;
      color: var(--ink);
      font-weight: 700;
      text-align: left;
    }

    .cz-rank-table {
      width: 100%;
      border-collapse: collapse;
    }

    .cz-rank-table td {
      padding: 2px 4px 2px 0;
      font-size: 9px;
      line-height: 1.25;
      color: var(--muted);
      font-weight: 500;
      vertical-align: top;
    }

    .cz-rank-table td:last-child {
      text-align: right;
      padding-right: 0;
    }

    .cz-rank-table tr[data-top-cz] {
      cursor: pointer;
    }

    .cz-rank-table .rank-name {
      text-align: left;
    }

    .cz-rank-table .rank-value {
      text-align: right;
    }

    .cz-rank-col ol {
      margin: 0;
      padding-left: 14px;
    }

    .cz-rank-col li {
      margin: 2px 0;
      font-size: 9px;
      line-height: 1.25;
      color: var(--muted);
      font-weight: 500;
    }

    .hover-card p.is-muted {
      color: #9aa1aa;
      font-weight: 400;
    }

    .hover-card p.is-active {
      color: var(--ink);
      font-weight: 400;
    }

    .hover-emphasis {
      font-weight: 600;
    }

    .hover-change-line {
      font-weight: 700;
      color: var(--ink);
    }

    .hover-change-value {
      font-weight: 800;
    }

    .hover-actions {
      margin-top: 0;
      padding-top: 0;
      margin-bottom: 8px;
      display: flex;
      justify-content: flex-end;
    }

    .hover-reset {
      background: #3b4048;
      border: 1px solid #e8ecf2;
      border-radius: 12px;
      padding: 6px 8px;
      cursor: pointer;
      box-shadow: 0 6px 12px rgba(36, 40, 47, 0.22);
      font-family: var(--font-ui);
      font-size: 7px;
      font-weight: 600;
      color: #ffffff;
    }

    .region-label-icon {
      background: transparent;
      border: none;
    }

    .region-label {
      display: inline-block;
      transform: translate(-50%, -50%);
      color: #1d2329;
      font-size: 8px;
      font-weight: 600;
      line-height: 1.1;
      text-align: center;
      text-shadow:
        -1px -1px 0 rgba(255, 252, 246, 0.95),
        1px -1px 0 rgba(255, 252, 246, 0.95),
        -1px 1px 0 rgba(255, 252, 246, 0.95),
        1px 1px 0 rgba(255, 252, 246, 0.95);
      white-space: nowrap;
      pointer-events: none;
    }

    .region-label-value {
      display: block;
      margin-top: 2px;
      font-weight: 700;
    }

    .note {
      font-size: 11px;
      color: var(--muted);
      font-weight: 400;
    }


    @media (max-width: 980px) {
      .layout {
        gap: 12px;
        padding: 5px 12px 12px;
      }

      .panel {
        grid-template-columns: 1fr;
        padding: 16px 14px;
        gap: 12px;
      }

      .control-step + .control-step {
        border-left: none;
        border-top: 1px solid rgba(36, 40, 47, 0.14);
        padding-left: 0;
        padding-top: 12px;
      }

      .map-wrap {
        padding: 8px 0;
      }

      #map {
        width: 100%;
        height: 34vh;
        min-height: 34vh;
        margin-top: 30px;
        margin-left: 0;
      }

      .map-title {
        top: 8px;
        left: 18px;
        right: 18px;
        width: calc(100% - 36px);
      }

      .cz-info-line {
        margin-top: 32px;
        margin-bottom: 4px;
      }

      .map-title h2 {
        font-size: 16px;
        line-height: 1.1;
      }

      .map-legend-wrap {
        top: 30px;
        right: 18px;
        width: min(260px, calc(100% - 24px));
      }

      .legend {
        padding: 7px 10px 6px;
      }

      .legend h3 {
        font-size: 8px;
        margin-bottom: 6px;
      }

      .legend-scale {
        gap: 6px;
      }

      .legend-bar {
        height: 12px;
      }

      .legend-end {
        font-size: 8px;
      }

      .hover-card {
        width: min(300px, calc(100vw - 24px));
        padding: 10px 12px;
      }

      .hover-card h3 {
        font-size: 13px;
      }

      .hover-card p {
        font-size: 9px;
      }

      .stat-value {
        font-size: 12px;
      }

      .option-button {
        font-size: 11px;
      }

      }
    }
  </style>
</head>
<body>
  <div class="layout">

            <div class="compare-block is-hidden" id="compare-block">
              <div class="compare-header">

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="./manufacturing_map_data.js"></script>
  <script>
    const bundle = window.MANUFACTURING_MAP_DATA;
    const mainlandBounds = L.latLngBounds(
      L.latLng(24.5, -125.0),
      L.latLng(49.5, -66.5)
    );
    const mapTopPaddingPx = 0;
    const fullViewZoomBoost = 0;
    const map = L.map("map", {
      zoomSnap: 0.25,
      minZoom: 3,
      maxZoom: 10,
      zoomControl: false,
      dragging: false,
      touchZoom: false,
      scrollWheelZoom: true,
      doubleClickZoom: false,
      boxZoom: false,
      keyboard: false,
      tap: false
    });
    map.dragging.disable();

    const topList = document.getElementById("top-list");
    const monthSelect = document.getElementById("month-select");
    const yearSelect = document.getElementById("year-select");
    const compareBlock = document.getElementById("compare-block");
    const compareToggleBtn = document.getElementById("compare-toggle-btn");
    const exitCompareBtn = document.getElementById("exit-compare-btn");
    const compareDateText = document.getElementById("compare-date-text");
    const mapTitleText = document.getElementById("map-title-text");
    const mapResetBtn = document.getElementById("map-reset-btn");
    const czInfoLine = document.getElementById("cz-info-line");
    const slider = document.getElementById("month-slider");
    const compareSlider = document.getElementById("compare-slider");
    const panelLegend = document.getElementById("panel-legend");
    const metricInputs = Array.from(document.querySelectorAll('input[name="metric"]'));
    const metricChoiceLabels = Array.from(document.querySelectorAll(".filter-choice"));
    const displayMetricButtons = Array.from(document.querySelectorAll("[data-display-metric]"));
    const allDates = bundle.dates;
    let currentDate = bundle.latestDate;
    let comparisonDate = bundle.latestDate;
    let currentMetric = "emplvl31_33";
    let currentDisplayMetric = "jobs";
    let isComparisonActive = false;
    let hoveredCz = null;
    let geojson = null;
    let hoveredLayer = null;
    let listHoveredLayer = null;
    let isFullView = true;
    let labelLayer = null;
    let hoverLabelLayer = null;
    let topFiveLabelLayer = null;
    let topFiveCzSet = new Set();
    let fullViewZoom = null;
    const monthNames = [
      "January", "February", "March", "April", "May", "June",
      "July", "August", "September", "October", "November", "December"
    ];
    const availableDates = new Set(allDates);
    const availableYears = [...new Set(allDates.map((value) => value.split("/")[1]))];

    slider.max = String(allDates.length - 1);
    slider.value = String(allDates.length - 1);
    compareSlider.max = String(allDates.length - 1);
    const defaultComparisonIndex = Math.max(0, allDates.length - 13);
    comparisonDate = allDates[defaultComparisonIndex];
    compareDateText.textContent = formatMonthYear(comparisonDate);
    mapTitleText.textContent = `Number of Manufacturing Jobs in ${formatMonthYear(currentDate)}`;
    syncComparisonSliderConstraint(true);

    const basePalette = ["#d9dae8", "#c4c7dd", "#a8aecf", "#848db7", "#5f699e"];
    const negativePalette = ["#b63f52", "#d68b96", "#d9d9e2"];
    const positivePalette = ["#d9d9e2", "#9ca3c8", "#5f699e"];
    const metricConfig = {
      emplvl31_33: {
        shortLabel: "Manufacturing",
        jobsLabel: "Manufacturing jobs",
        titleLabel: "Manufacturing",
        percentLabel: "Manufacturing jobs as a percent of total employment",
        infoLabel: "Manufacturing",
        topListJobsLabel: "manufacturing jobs",
        percentKey: "Percent_Manufacturing"
      },
      emplvl334: {
        shortLabel: "Electronics",
        jobsLabel: "Electronics jobs",
        titleLabel: "Electronics",
        percentLabel: "Electronics jobs as a percent of total employment",
        infoLabel: "Electronics",
        topListJobsLabel: "electronics jobs",
        percentKey: "Percent_Electronics"
      },
      emplvl336: {
        shortLabel: "Transportation Equipment",
        jobsLabel: "Transportation equipment jobs",
        titleLabel: "Transportation Equipment",
        percentLabel: "Transportation equipment jobs as a percent of total employment",
        infoLabel: "Transportation equip.",
        topListJobsLabel: "transportation equipment jobs",
        percentKey: "Percent_Transportation_equipment"
      }
    };

    function formatNumber(value) {
      return new Intl.NumberFormat("en-US", { maximumFractionDigits: 0 }).format(value || 0);
    }

    function formatPercent(value) {
      return `${((value || 0) * 100).toFixed(1)}%`;
    }

    function formatChangeJobs(value) {
      if (!Number.isFinite(value)) {
        return "N/A";
      }
      const sign = value > 0 ? "+" : "";
      return `${sign}${formatNumber(value)}`;
    }

    function formatComparisonChangeValue(value) {
      if (!Number.isFinite(value)) {
        return "N/A";
      }
      if (currentDisplayMetric === "percent") {
        const sign = value > 0 ? "+" : "";
        return `${sign}${(value * 100).toFixed(1)}%`;
      }
      return formatChangeJobs(value);
    }

    function formatMonthYear(value) {
      if (!value) return "";
      const [month, year] = value.split("/");
      const date = new Date(Number(year), Number(month) - 1, 1);
      return date.toLocaleString("en-US", { month: "long", year: "numeric" });
    }

    function formatMonthYearTwoLine(value) {
      if (!value) return "";
      const [month, year] = value.split("/");
      const date = new Date(Number(year), Number(month) - 1, 1);
      const monthText = date.toLocaleString("en-US", { month: "long" });
      const yearText = date.toLocaleString("en-US", { year: "numeric" });
      return `${monthText}<br>${yearText}`;
    }

    function getMonthValue(dateValue) {
      return dateValue.split("/")[0];
    }

    function getYearValue(dateValue) {
      return dateValue.split("/")[1];
    }

    function buildYearOptions() {
      yearSelect.innerHTML = availableYears
        .map((year) => `<option value="${year}">${year}</option>`)
        .join("");
    }

    function buildMonthOptions(selectedYear) {
      monthSelect.innerHTML = monthNames.map((name, index) => {
        const monthValue = String(index + 1).padStart(2, "0");
        const isAvailable = availableDates.has(`${monthValue}/${selectedYear}`);
        return `<option value="${monthValue}"${isAvailable ? "" : " disabled"}>${name}</option>`;
      }).join("");
    }

    function syncDateSelectors() {
      const yearValue = getYearValue(currentDate);
      const monthValue = getMonthValue(currentDate);
      yearSelect.value = yearValue;
      buildMonthOptions(yearValue);
      monthSelect.value = monthValue;
    }

    function syncSliderToCurrentDate() {
      slider.value = String(allDates.indexOf(currentDate));
    }

    function syncComparisonSliderConstraint(shouldAlignValue = false) {
      const currentIndex = allDates.indexOf(currentDate);
      const maxIndex = Math.max(0, currentIndex - 1);

      let compareIndex = allDates.indexOf(comparisonDate);
      if (compareIndex < 0) {
        compareIndex = 0;
      }
      if (shouldAlignValue) {
        compareIndex = Math.min(compareIndex, maxIndex);
        comparisonDate = allDates[compareIndex];
        compareDateText.textContent = formatMonthYear(comparisonDate);
      }
      compareSlider.value = String(compareIndex);

      const canCompare = currentIndex > 0;
      compareSlider.disabled = !canCompare;
      compareToggleBtn.disabled = !canCompare;
    }

    function setCurrentDate(dateValue) {
      let nextDate = dateValue;
      if (isComparisonActive) {
        const requestedIndex = allDates.indexOf(dateValue);
        const compareIndex = allDates.indexOf(comparisonDate);
        if (requestedIndex <= compareIndex) {
          const minAllowedIndex = Math.min(allDates.length - 1, compareIndex + 1);
          nextDate = allDates[minAllowedIndex];
        }
      }

      currentDate = nextDate;
      syncSliderToCurrentDate();
      syncDateSelectors();
      syncComparisonSliderConstraint(false);
      refreshMap();
    }

    function getCurrentMetricConfig() {
      return metricConfig[currentMetric];
    }

    function getCurrentPercentKey() {
      return getCurrentMetricConfig().percentKey;
    }

    function getMapTitle() {
      const prefix = currentDisplayMetric === "percent" ? "Percent of" : "Number of";
      return `${prefix} ${getCurrentMetricConfig().titleLabel} Jobs in ${formatMonthYear(currentDate)}`;
    }

    function getMapTitleBase() {
      const prefix = currentDisplayMetric === "percent" ? "Percent of" : "Number of";
      return `${prefix} ${getCurrentMetricConfig().titleLabel} Jobs`;
    }

    function getComparisonTitleBase() {
      const prefix = currentDisplayMetric === "percent" ? "Percent of" : "Number of";
      return `Change in ${prefix} ${getCurrentMetricConfig().titleLabel} Jobs`;
    }

    function getLegendLabel() {
      if (isComparisonActive) {
        const metricLabel = currentDisplayMetric === "percent"
          ? getCurrentMetricConfig().percentLabel
          : getCurrentMetricConfig().jobsLabel;
        return `Change in ${metricLabel}`;
      }
      const metricLabel = currentDisplayMetric === "percent"
        ? getCurrentMetricConfig().percentLabel
        : getCurrentMetricConfig().jobsLabel;
      return metricLabel;
    }

    function getDisplayValue(record) {
      if (!record) return null;
      return currentDisplayMetric === "percent"
        ? record[getCurrentPercentKey()]
        : record[currentMetric];
    }

    function formatDisplayValue(value) {
      return currentDisplayMetric === "percent"
        ? formatPercent(value)
        : formatNumber(value);
    }

    function formatLegendValue(value) {
      if (currentDisplayMetric === "percent") {
        return `${Math.round((value || 0) * 100)}%`;
      }
      return formatNumber(value || 0);
    }

    function hexToRgb(hex) {
      const normalized = hex.replace("#", "");
      const value = normalized.length === 3
        ? normalized.split("").map((c) => c + c).join("")
        : normalized;
      return {
        r: parseInt(value.slice(0, 2), 16),
        g: parseInt(value.slice(2, 4), 16),
        b: parseInt(value.slice(4, 6), 16)
      };
    }

    function rgbToHex(rgb) {
      const toHex = (value) => Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, "0");
      return `#${toHex(rgb.r)}${toHex(rgb.g)}${toHex(rgb.b)}`;
    }

    function interpolateColor(colorA, colorB, t) {
      const a = hexToRgb(colorA);
      const b = hexToRgb(colorB);
      return rgbToHex({
        r: a.r + (b.r - a.r) * t,
        g: a.g + (b.g - a.g) * t,
        b: a.b + (b.b - a.b) * t
      });
    }

    function getRecordForDate(cz, dateValue) {
      return bundle.timeSeries[dateValue]?.[String(cz)] || null;
    }

    function getMetricValueForDate(cz, dateValue) {
      return getDisplayValue(getRecordForDate(cz, dateValue));
    }

    function getPercentChangeForCz(cz) {
      const currentValue = getMetricValueForDate(cz, currentDate);
      const comparisonValue = getMetricValueForDate(cz, comparisonDate);

      if (!Number.isFinite(currentValue) || !Number.isFinite(comparisonValue)) {
        return null;
      }
      return currentValue - comparisonValue;
    }

    function getCurrentMetricValues() {
      if (isComparisonActive) {
        return bundle.geojson.features
          .map((feature) => getPercentChangeForCz(feature.properties.cz))
          .filter((value) => Number.isFinite(value));
      }
      return Object.values(bundle.timeSeries[currentDate] || {})
        .map((row) => getDisplayValue(row))
        .filter((value) => Number.isFinite(value) && value >= 0);
    }

    function getScaleDomain() {
      const values = getCurrentMetricValues();
      if (!values.length) {
        return isComparisonActive
          ? { min: -0.01, max: 0.01, maxAbs: 0.01 }
          : { min: 0, minPositive: 1, max: 1, hasZero: false };
      }
      if (isComparisonActive) {
        const min = Math.min(...values);
        const max = Math.max(...values);
        const maxAbs = Math.max(...values.map((value) => Math.abs(value)));
        return { min, max, maxAbs: Math.max(maxAbs, 0.01) };
      }
      const positiveValues = values.filter((value) => value > 0);
      return {
        min: Math.min(...values),
        minPositive: positiveValues.length ? Math.min(...positiveValues) : 1,
        max: Math.max(...values),
        hasZero: values.some((value) => value === 0)
      };
    }

    function colorFor(value) {
      if (value == null) {
        return getComputedStyle(document.documentElement).getPropertyValue("--map-empty").trim() || "#f6f6fb";
      }

      const domain = getScaleDomain();
      if (isComparisonActive) {
        const normalized = Math.max(-1, Math.min(1, value / domain.maxAbs));
        if (normalized === 0) {
          return "#d9d9e2";
        }

        const activePalette = normalized < 0 ? negativePalette : positivePalette;
        const absValue = Math.abs(normalized);
        const scaled = absValue * (activePalette.length - 1);
        const index = Math.min(activePalette.length - 2, Math.floor(scaled));
        const localT = scaled - index;
        return interpolateColor(activePalette[index], activePalette[index + 1], localT);
      }

      if (value === 0) {
        return basePalette[0];
      }

      if (currentDisplayMetric === "percent") {
        if (domain.max <= domain.min) {
          return basePalette[basePalette.length - 1];
        }
        const normalized = (value - domain.min) / (domain.max - domain.min);
        const clamped = Math.max(0, Math.min(1, normalized));
        const scaled = clamped * (basePalette.length - 1);
        const index = Math.min(basePalette.length - 2, Math.floor(scaled));
        const localT = scaled - index;
        return interpolateColor(basePalette[index], basePalette[index + 1], localT);
      }

      if (domain.max <= domain.minPositive) {
        return basePalette[basePalette.length - 1];
      }
      const logMin = Math.log10(domain.minPositive);
      const logMax = Math.log10(domain.max);
      const normalized = (Math.log10(value) - logMin) / (logMax - logMin);
      const clamped = Math.max(0, Math.min(1, normalized));
      const scaled = clamped * (basePalette.length - 1);
      const index = Math.min(basePalette.length - 2, Math.floor(scaled));
      const localT = scaled - index;
      return interpolateColor(basePalette[index], basePalette[index + 1], localT);
    }

    function getLegendTicks() {
      const domain = getLogScaleDomain();
      if (domain.max <= domain.min) {
        return [domain.min];
      }

      const steps = palette.length;
      const logMin = Math.log10(domain.min);
      const logMax = Math.log10(domain.max);
      const ticks = [];

      for (let i = 0; i < steps; i += 1) {
        const t = i / (steps - 1);
        ticks.push(Math.round(10 ** (logMin + (logMax - logMin) * t)));
      }

      return ticks;
    }

    function getRecord(cz) {
      return getRecordForDate(cz, currentDate);
    }

    function getComparisonRecord(cz) {
      return getRecordForDate(cz, comparisonDate);
    }

    function getChangeForRecord(cz) {
      return getPercentChangeForCz(cz);
    }

    function style(feature) {
      const value = isComparisonActive
        ? getChangeForRecord(feature.properties.cz)
        : getDisplayValue(getRecord(feature.properties.cz));
      return {
        fillColor: colorFor(value),
        weight: 0.85,
        opacity: 1,
        color: "#8f929b",
        fillOpacity: value == null ? 0.96 : 0.9
      };
    }

    function shortRegionName(name) {
      return (name || "")
        .replace(/\s*,\s*[A-Z]{2}(?:-[A-Z]{2})?$/, "")
        .replace(/\s+Surrounding$/, "");
    }

    function hoverMetricClass(metricKey) {
      return currentMetric === metricKey ? "is-active" : "is-muted";
    }

    function getInfoValue(record, metricKey) {
      if (!record) return "0";
      if (currentDisplayMetric === "percent") {
        return formatPercent(record[metricConfig[metricKey].percentKey]);
      }
      return formatNumber(record[metricKey]);
    }

    function getSelectedInfoLine(record) {
      return `<p class="is-active"><span class="hover-emphasis">${getCurrentMetricConfig().infoLabel}: ${getInfoValue(record, currentMetric)}</span> out of ${formatNumber(record.emplvl_total)} total jobs</p>`;
    }

    function getTopBottomCzMarkup() {
      const rows = isComparisonActive
        ? bundle.geojson.features
          .map((feature) => {
            const cz = String(feature.properties.cz);
            const record = getRecord(cz);
            const value = getChangeForRecord(cz);
            let score = null;
            if (value === Number.POSITIVE_INFINITY || value === Number.NEGATIVE_INFINITY) {
              score = Number.POSITIVE_INFINITY;
            } else if (Number.isFinite(value)) {
              score = Math.abs(value);
            }
            return {
              cz,
              name: record?.cz_name || `CZ ${cz}`,
              value,
              score
            };
          })
          .filter((row) => row.score != null)
          .sort((a, b) => b.score - a.score)
        : Object.entries(bundle.timeSeries[currentDate] || {})
          .map(([cz, row]) => ({ cz, name: row.cz_name, value: getDisplayValue(row), score: getDisplayValue(row) }))
          .filter((row) => Number.isFinite(row.value))
          .sort((a, b) => b.value - a.value);

      if (!rows.length) {
        topFiveCzSet = new Set();
        return `<p>No data available for the selected settings.</p>`;
      }

      const topFive = rows.slice(0, 5);
      topFiveCzSet = new Set(topFive.map((row) => String(row.cz)));
      const formatValue = (v) => isComparisonActive ? formatComparisonChangeValue(v) : formatDisplayValue(v);

      return `
        <div class="cz-rank-table-wrap">
          <h4>Top 5 Commuting Zones</h4>
          <table class="cz-rank-table">
            <tbody>
              ${topFive.map((row) => `<tr data-top-cz="${row.cz}"><td class="rank-name">${row.name}</td><td class="rank-value">${formatValue(row.value)}</td></tr>`).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderTopFiveHighlights() {
      if (!geojson || !topFiveLabelLayer) return;
      topFiveLabelLayer.clearLayers();
      if (hoveredCz || !topFiveCzSet.size) {
        return;
      }

      geojson.eachLayer((layer) => {
        const cz = String(layer.feature.properties.cz);
        if (!topFiveCzSet.has(cz)) return;

        const record = getRecord(cz);
        const name = shortRegionName(record?.cz_name || `CZ ${cz}`);

        layer.setStyle({
          weight: 1.8,
          color: "#6f738f",
          fillOpacity: 0.97
        });

        const marker = L.marker(layer.getBounds().getCenter(), {
          interactive: false,
          icon: L.divIcon({
            className: "region-label-icon",
            html: `<div class="region-label">${name}</div>`
          })
        });
        topFiveLabelLayer.addLayer(marker);
      });
    }

    function renderHoverLabel(cz, includeValue = true) {
      if (!hoverLabelLayer) return;
      hoverLabelLayer.clearLayers();

      if (!cz) {
        return;
      }

      geojson.eachLayer((layer) => {
        if (layer.feature.properties.cz !== cz) {
          return;
        }

        const record = getRecord(cz);
        const metricValue = isComparisonActive
          ? formatComparisonChangeValue(getChangeForRecord(cz))
          : formatDisplayValue(getDisplayValue(record));
        const marker = L.marker(layer.getBounds().getCenter(), {
          interactive: false,
          icon: L.divIcon({
            className: "region-label-icon",
            html: includeValue
              ? `<div class="region-label"><span class="region-label-value">${metricValue}</span>${shortRegionName(record?.cz_name || `CZ ${cz}`)}</div>`
              : `<div class="region-label">${shortRegionName(record?.cz_name || `CZ ${cz}`)}</div>`
          })
        });
        hoverLabelLayer.addLayer(marker);
      });
    }

    function updateRegionLabels() {
      if (!labelLayer) return;
      labelLayer.clearLayers();

      if (isFullView || map.getZoom() < 7) {
        return;
      }

      const bounds = map.getBounds();
      const candidates = [];

      geojson.eachLayer((layer) => {
        const layerBounds = layer.getBounds();
        if (!bounds.intersects(layerBounds)) {
          return;
        }

        const record = getRecord(layer.feature.properties.cz);
        const value = getDisplayValue(record);
        if (!record || value == null) {
          return;
        }

        candidates.push({
          name: shortRegionName(record.cz_name),
          value,
          center: layerBounds.getCenter()
        });
      });

      candidates
        .sort((a, b) => b.value - a.value)
        .forEach((item) => {
          const marker = L.marker(item.center, {
            interactive: false,
            icon: L.divIcon({
              className: "region-label-icon",
              html: `<div class="region-label">${item.name || "Unnamed region"}</div>`
            })
          });
          labelLayer.addLayer(marker);
        });
    }

    const info = { _div: czInfoLine };
    info.update = function(cz) {
      if (!cz) {
        this._div.innerHTML = `
          <h3>Explore the map</h3>
          <p>Move mouse over the map to see employment data</p>
          ${getTopBottomCzMarkup()}
        `;
        return;
      }

      const props = getRecord(cz);
      const compareProps = getComparisonRecord(cz);
      const changeValue = getChangeForRecord(cz);

      if (!props) {
        this._div.innerHTML = `
          <h3>CZ ${cz}</h3>
          <p>Geometry is present, but no matching manufacturing record was found for ${formatMonthYear(currentDate)}.</p>
        `;
        return;
      }

      this._div.innerHTML = `
        <h3>${props.cz_name}</h3>
        ${getSelectedInfoLine(props)}
        ${isComparisonActive ? `<p>Compared with ${formatMonthYear(comparisonDate)}: ${compareProps ? formatDisplayValue(getDisplayValue(compareProps)) : "No data"}</p>` : ""}
        ${isComparisonActive ? `<p class="hover-change-line">Change from ${comparisonDate} to ${currentDate}: <span class="hover-change-value" style="color:${changeValue == null ? "var(--muted)" : colorFor(changeValue)}">${formatComparisonChangeValue(changeValue)}</span></p>` : ""}
      `;
    };
    info.update();
    mapResetBtn.addEventListener("click", () => {
      isFullView = true;
      map.dragging.disable();
      map.fitBounds(mainlandBounds, { paddingTopLeft: [0, 0 + mapTopPaddingPx], paddingBottomRight: [0, 0] });
      map.setZoom(Math.min(map.getZoom() + fullViewZoomBoost, map.getMaxZoom()));
      info.update(hoveredCz);
    });

    const legend = {
      update() {
        const div = panelLegend;
        if (!div) return;
        const domain = getScaleDomain();
        const minLabel = isComparisonActive
          ? formatComparisonChangeValue(domain.min)
          : formatLegendValue(domain.hasZero ? 0 : domain.minPositive);
        const maxLabel = isComparisonActive
          ? formatComparisonChangeValue(domain.max)
          : formatLegendValue(domain.max);
        const legendGradient = isComparisonActive
          ? "linear-gradient(90deg, #b63f52 0%, #d68b96 25%, #d9d9e2 50%, #9ca3c8 75%, #5f699e 100%)"
          : "linear-gradient(90deg, #d9dae8 0%, #5f699e 100%)";
        div.innerHTML = `
          <h3>${getLegendLabel()}</h3>
          <div class="legend-scale">
            <span class="legend-end">${minLabel}</span>
            <div class="legend-bar" style="background:${legendGradient}" aria-hidden="true"></div>
            <span class="legend-end">${maxLabel}</span>
          </div>
        `;
      }
    };

    let activeLayer = null;

    function applyHoverToLayer(layer) {
      if (hoveredLayer && hoveredLayer !== layer) {
        geojson.resetStyle(hoveredLayer);
      }
      hoveredLayer = layer;
      hoveredCz = layer.feature.properties.cz;
      layer.setStyle({
        weight: 1.8,
        color: "#6f738f",
        fillOpacity: 0.97
      });
      if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
        layer.bringToFront();
      }
      renderHoverLabel(layer.feature.properties.cz);
      info.update(layer.feature.properties.cz);
      renderTopFiveHighlights();
    }

    function highlightFeature(event) {
      applyHoverToLayer(event.target);
    }

    function applyVisualHighlight(layer) {
      if (!layer) return;
      layer.setStyle({
        weight: 1.8,
        color: "#6f738f",
        fillOpacity: 0.97
      });
      if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
        layer.bringToFront();
      }
    }

    function resetHighlight(event) {
      geojson.resetStyle(event.target);
      if (hoveredLayer === event.target) {
        hoveredLayer = null;
      }
      hoveredCz = null;
      renderHoverLabel(null);
      info.update();
      renderTopFiveHighlights();
    }

    function findLayerByCz(cz) {
      let match = null;
      geojson.eachLayer((layer) => {
        if (String(layer.feature.properties.cz) === String(cz)) {
          match = layer;
        }
      });
      return match;
    }

    function zoomToFeature(event) {
      activeLayer = event.target;
      isFullView = false;
      map.dragging.enable();
      const targetBounds = activeLayer.getBounds();
      const paddedZoom = map.getBoundsZoom(targetBounds, false, L.point(900, 900));
      const targetZoom = Math.max(fullViewZoom, paddedZoom - 3);
      map.setView(targetBounds.getCenter(), targetZoom);
      info.update(hoveredCz);
    }

    function onEachFeature(feature, layer) {
      layer.on({
        mouseover: highlightFeature,
        mouseout: resetHighlight,
        click: zoomToFeature
      });
    }

    geojson = L.geoJSON(bundle.geojson, {
      style,
      onEachFeature
    }).addTo(map);
    hoveredCz = null;
    geojson.eachLayer((layer) => {
      geojson.resetStyle(layer);
    });
    labelLayer = L.layerGroup().addTo(map);
    hoverLabelLayer = L.layerGroup().addTo(map);
    topFiveLabelLayer = L.layerGroup().addTo(map);
    renderHoverLabel(null);

    map.fitBounds(mainlandBounds, { paddingTopLeft: [0, 0 + mapTopPaddingPx], paddingBottomRight: [0, 0] });
    map.setZoom(Math.min(map.getZoom() + fullViewZoomBoost, map.getMaxZoom()));
    map.setMaxBounds(mainlandBounds);
    fullViewZoom = map.getZoom();
    map.setMinZoom(fullViewZoom);
    map.on("moveend zoomend", () => {
      const zoomedIn = map.getZoom() > fullViewZoom;
      isFullView = !zoomedIn;
      mapResetBtn.classList.toggle("is-hidden", isFullView);
      if (zoomedIn) {
        map.dragging.enable();
      } else {
        map.dragging.disable();
      }
      updateRegionLabels();
      info.update(hoveredCz);
      renderTopFiveHighlights();
    });

    map.on("mouseout", () => {
      if (!hoveredCz) return;
      if (hoveredLayer) {
        geojson.resetStyle(hoveredLayer);
        hoveredLayer = null;
      }
      hoveredCz = null;
      renderHoverLabel(null);
      info.update();
      renderTopFiveHighlights();
    });

    czInfoLine.addEventListener("mouseover", (event) => {
      const row = event.target.closest("tr[data-top-cz]");
      if (!row) return;
      const layer = findLayerByCz(row.dataset.topCz);
      if (!layer) return;
      topFiveLabelLayer?.clearLayers();
      geojson.eachLayer((candidate) => {
        if (topFiveCzSet.has(String(candidate.feature.properties.cz)) && candidate !== layer) {
          geojson.resetStyle(candidate);
        }
      });
      if (listHoveredLayer && listHoveredLayer !== layer && listHoveredLayer !== hoveredLayer) {
        geojson.resetStyle(listHoveredLayer);
      }
      listHoveredLayer = layer;
      if (layer !== hoveredLayer) {
        applyVisualHighlight(layer);
      }
      renderHoverLabel(layer.feature.properties.cz, false);
    });

    czInfoLine.addEventListener("mouseout", (event) => {
      const row = event.target.closest("tr[data-top-cz]");
      if (!row) return;
      const related = event.relatedTarget;
      if (related && row.contains(related)) return;
      if (listHoveredLayer && listHoveredLayer !== hoveredLayer) {
        geojson.resetStyle(listHoveredLayer);
      }
      listHoveredLayer = null;
      if (!hoveredCz) {
        renderHoverLabel(null);
        renderTopFiveHighlights();
      }
    });

    function renderTopList() {
      if (!topList) {
        return;
      }

      topList.innerHTML = "";
      const topZones = Object.values(bundle.timeSeries[currentDate] || {})
        .sort((a, b) => (getDisplayValue(b) || 0) - (getDisplayValue(a) || 0))
        .slice(0, 10);

      topZones.forEach((feature) => {
        const item = document.createElement("li");
        const valueText = currentDisplayMetric === "percent"
          ? `${formatPercent(feature[getCurrentPercentKey()])} of total employment`
          : `${formatNumber(feature[currentMetric])} ${getCurrentMetricConfig().topListJobsLabel}`;
        item.innerHTML = `
          <strong>${feature.cz_name}</strong>
          <span>${valueText}</span>
        `;
        topList.appendChild(item);
      });
    }

    function updateDisplayMetricButtons() {
      displayMetricButtons.forEach((button) => {
        const isActive = button.dataset.displayMetric === currentDisplayMetric;
        button.classList.toggle("is-active", isActive);
      });
    }

    function updateMetricChoices() {
      metricChoiceLabels.forEach((label) => {
        const input = label.querySelector('input[name="metric"]');
        const isSelected = input?.value === currentMetric;
        label.classList.toggle("is-selected", isSelected);
        if (input) {
          input.disabled = isSelected;
        }
      });
    }

    function setComparisonActive(active) {
      isComparisonActive = active;
      compareBlock.classList.toggle("is-hidden", !active);
      compareToggleBtn.classList.toggle("is-hidden", active);
      exitCompareBtn.classList.toggle("is-hidden", !active);
      updateDisplayMetricButtons();
    }

    function refreshMap() {
      mapTitleText.textContent = isComparisonActive
        ? `${getComparisonTitleBase()} from ${formatMonthYear(comparisonDate)} to ${formatMonthYear(currentDate)}`
        : getMapTitle();
      geojson.setStyle(style);
      updateRegionLabels();
      renderHoverLabel(hoveredCz);
      renderTopList();
      legend.update();
      info.update(hoveredCz);
      renderTopFiveHighlights();
    }

    slider.addEventListener("input", (event) => {
      setCurrentDate(allDates[Number(event.target.value)]);
    });

    compareSlider.addEventListener("input", (event) => {
      const currentIndex = allDates.indexOf(currentDate);
      const requestedIndex = Number(event.target.value);
      const maxAllowedIndex = Math.max(0, currentIndex - 1);
      const constrainedIndex = Math.min(requestedIndex, maxAllowedIndex);

      if (requestedIndex !== constrainedIndex) {
        compareSlider.value = String(constrainedIndex);
      }

      comparisonDate = allDates[constrainedIndex];
      compareDateText.textContent = formatMonthYear(comparisonDate);
      if (isComparisonActive) {
        refreshMap();
      }
    });

    compareToggleBtn.addEventListener("click", () => {
      const currentIndex = allDates.indexOf(currentDate);
      const maxAllowedIndex = Math.max(0, currentIndex - 1);
      const jan2002Index = allDates.indexOf("01/2002");
      const targetIndex = Math.min(
        jan2002Index >= 0 ? jan2002Index : 0,
        maxAllowedIndex
      );
      compareSlider.value = String(targetIndex);
      comparisonDate = allDates[targetIndex];
      compareDateText.textContent = formatMonthYear(comparisonDate);
      setComparisonActive(true);
      refreshMap();
    });

    exitCompareBtn.addEventListener("click", () => {
      setComparisonActive(false);
      refreshMap();
    });

    yearSelect.addEventListener("change", () => {
      const yearValue = yearSelect.value;
      buildMonthOptions(yearValue);
      const currentMonth = getMonthValue(currentDate);
      const nextMonth = availableDates.has(`${currentMonth}/${yearValue}`)
        ? currentMonth
        : monthSelect.querySelector("option:not([disabled])")?.value;
      if (!nextMonth) {
        return;
      }
      monthSelect.value = nextMonth;
      setCurrentDate(`${nextMonth}/${yearValue}`);
    });

    monthSelect.addEventListener("change", () => {
      const nextDate = `${monthSelect.value}/${yearSelect.value}`;
      if (!availableDates.has(nextDate)) {
        return;
      }
      setCurrentDate(nextDate);
    });

    metricInputs.forEach((input) => {
      input.addEventListener("change", (event) => {
        currentMetric = event.target.value;
        updateMetricChoices();
        refreshMap();
      });
    });

    displayMetricButtons.forEach((button) => {
      button.addEventListener("click", () => {
        currentDisplayMetric = button.dataset.displayMetric;
        updateDisplayMetricButtons();
        refreshMap();
      });
    });

    buildYearOptions();
    syncDateSelectors();
    setComparisonActive(false);
    updateDisplayMetricButtons();
    updateMetricChoices();
    renderTopList();
    legend.update();
    updateRegionLabels();
    requestAnimationFrame(() => map.invalidateSize());
  </script>
</body>
</html>
